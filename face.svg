<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Classic Roblox Face - OG recreation v3 -->
  <rect width="256" height="256" fill="#A1937F"/>
  
  <!-- Left eye - small oval, lower position -->
  <ellipse cx="100" cy="118" rx="7" ry="9" fill="#1a1a1a"/>
  
  <!-- Right eye - small oval, matching -->
  <ellipse cx="156" cy="118" rx="7" ry="9" fill="#1a1a1a"/>
  
  <!-- Classic smile - very gentle shallow curve -->
  <path d="M 85 160 Q 128 178 171 160" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
